# Legacy reference only. Authoritative IaC is Terraform under `infrastructure/terraform/`.
# Free web tier: Render does not support `preDeployCommand`. Run Alembic once after deploy
# (Render Shell: repo root, `uv run alembic -c components/issue_tracker_service/alembic.ini upgrade head`
# with `DATABASE_URL` in the environment), or upgrade to a paid plan to use pre-deploy migrations.
services:
  - type: web
    name: issue-tracker-service
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --all-extras
    startCommand: uv run uvicorn issue_tracker_service.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OTEL_SERVICE_NAME
        value: issue-tracker-service
      - key: TRELLO_CALLBACK_URL
        value: https://ospsd-team7-issue-tracker.onrender.com/auth/callback
      - key: AI_ALLOW_MUTATIONS
        value: "true"
      - key: OTEL_SDK_DISABLED
        value: "false"
      - key: TRELLO_API_KEY
        sync: false
      - key: TRELLO_API_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false