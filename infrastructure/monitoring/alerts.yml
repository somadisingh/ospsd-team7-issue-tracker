groups:
  - name: issue-tracker-slo-alerts
    rules:
      - alert: IssueTrackerHighErrorBudgetBurn
        expr: |
          sum(rate(http_server_responses_total{http_response_status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_responses_total[5m])), 1e-9)
          > 0.02
        for: 10m
        labels:
          severity: page
          service: issue-tracker-service
        annotations:
          summary: "High error budget burn on issue-tracker-service"
          description: "5xx ratio has exceeded 2% for 10m."

      - alert: IssueTrackerHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.5
        for: 10m
        labels:
          severity: page
          service: issue-tracker-service
        annotations:
          summary: "High p95 latency on issue-tracker-service"
          description: "P95 request latency has exceeded 1.5s for 10m."
