version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "uv.lock" }}
            - v1-deps-

      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV

      - run:
          name: Install dependencies
          command: |
            uv sync --all-extras

      - save_cache:
          paths:
            - .venv
          key: v1-deps-{{ checksum "uv.lock" }}

      - run:
          name: Ruff (linting)
          command: uv run ruff check .

      - run:
          name: Ruff (format check)
          command: uv run ruff format --check .

      - run:
          name: Mypy (static type checking)
          command: uv run mypy components/issue_tracker_client_api/src components/trello_client_impl/src components/issue_tracker_adapter/src components/issue_tracker_service/src components/ai_client_api/src components/claude_ai_client_impl/src components/chat_client_impl/src

  test:
    docker:
      - image: cimg/python:3.12
    # Project-level env vars (TRELLO_API_KEY, TRELLO_TOKEN, TRELLO_BOARD_ID)
    # are automatically available when set in CircleCI Project Settings
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "uv.lock" }}
            - v1-deps-

      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV

      - run:
          name: Install dependencies
          command: |
            uv sync --all-extras

      - save_cache:
          paths:
            - .venv
          key: v1-deps-{{ checksum "uv.lock" }}

      - run:
          name: Run tests (unit, integration, e2e)
          command: |
            export OTEL_SDK_DISABLED=true
            mkdir -p test-results
            uv run pytest \
              -m "unit or integration or e2e" \
              --junitxml=test-results/junit.xml \
              --cov=components \
              --cov-report=term-missing \
              --cov-report=html:htmlcov \
              --cov-report=xml:coverage.xml \
              -v

      - run:
          name: Upload coverage to Codecov
          command: |
            curl -sSfL https://codecov.io/bash -o codecov.sh
            bash codecov.sh -f coverage.xml -n circleci || echo "Codecov upload skipped (add repo at codecov.io to enable)"
          when: always

      - store_test_results:
          path: test-results
          when: always

      - store_artifacts:
          path: htmlcov
          destination: coverage-report
          when: always

  health_check:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Install dependencies
          command: uv sync --all-extras
      - run:
          name: Start service and health check
          command: |
            export DATABASE_URL="sqlite+pysqlite:///:memory:"
            export OTEL_SDK_DISABLED=true
            uv run uvicorn issue_tracker_service.main:app --host 0.0.0.0 --port 8000 &
            sleep 5
            curl -sf http://localhost:8000/health || exit 1

  validate_infra:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Validate Terraform
          command: |
            set -eu
            TVER=1.10.5
            curl -sSfL -o terraform.zip \
              "https://releases.hashicorp.com/terraform/${TVER}/terraform_${TVER}_linux_amd64.zip"
            unzip -o terraform.zip terraform
            chmod +x terraform
            mkdir -p /tmp/tf-"$TVER" && mv terraform /tmp/tf-"$TVER"/
            export PATH="/tmp/tf-$TVER:${PATH}"
            cd infrastructure/terraform
            terraform fmt -check -recursive
            terraform init -backend=false -input=false
            terraform validate
      - run:
          name: Validate render.yaml
          command: |
            pip install pyyaml
            python -c "import yaml; yaml.safe_load(open('render.yaml'))"

  deploy:
    docker:
      - image: cimg/python:3.12
    steps:
      - run:
          name: Trigger Render deploy
          command: |
            if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
              echo "RENDER_DEPLOY_HOOK_URL not set; skipping deploy"
              exit 0
            fi
            curl -X POST -f -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL" | grep -qE '^2[0-9]{2}$' || {
              echo "Render deploy hook returned non-2xx"
              exit 1
            }
            echo "Render deploy triggered successfully"

  deploy_gcp:
    docker:
      - image: google/cloud-sdk:stable
    steps:
      - checkout
      - run:
          name: GCP Cloud Build (optional Terraform apply)
          command: |
            apt-get update -qq &&
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq unzip >/dev/null
            bash .circleci/gcp_deploy.sh

workflows:
  version: 2
  ci:
    jobs:
      - lint
      - test
      - health_check
      - validate_infra
      - deploy:
          requires:
            - lint
            - test
            - health_check
      - deploy_gcp:
          requires:
            - lint
            - test
            - health_check
            - validate_infra
          filters:
            branches:
              only:
                - main
                - hw3
