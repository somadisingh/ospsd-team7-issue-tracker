version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "uv.lock" }}
            - v1-deps-

      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV

      - run:
          name: Install dependencies
          command: |
            uv sync --all-extras

      - save_cache:
          paths:
            - .venv
          key: v1-deps-{{ checksum "uv.lock" }}

      - run:
          name: Ruff (linting)
          command: uv run ruff check .

      - run:
          name: Ruff (format check)
          command: uv run ruff format --check .

      - run:
          name: Mypy (static type checking)
          command: uv run mypy components/issue_tracker_client_api/src components/trello_client_impl/src components/issue_tracker_adapter/src components/issue_tracker_service/src

  test:
    docker:
      - image: cimg/python:3.12
    # Project-level env vars (TRELLO_API_KEY, TRELLO_TOKEN, TRELLO_BOARD_ID)
    # are automatically available when set in CircleCI Project Settings
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "uv.lock" }}
            - v1-deps-

      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV

      - run:
          name: Install dependencies
          command: |
            uv sync --all-extras

      - save_cache:
          paths:
            - .venv
          key: v1-deps-{{ checksum "uv.lock" }}

      - run:
          name: Run tests (unit, integration, e2e)
          command: |
            export OTEL_SDK_DISABLED=true
            mkdir -p test-results
            uv run pytest \
              -m "unit or integration or e2e" \
              --junitxml=test-results/junit.xml \
              --cov=components \
              --cov-report=term-missing \
              --cov-report=html:htmlcov \
              --cov-report=xml:coverage.xml \
              -v

      - run:
          name: Upload coverage to Codecov
          command: |
            curl -sSfL https://codecov.io/bash -o codecov.sh
            bash codecov.sh -f coverage.xml -n circleci || echo "Codecov upload skipped (add repo at codecov.io to enable)"
          when: always

      - store_test_results:
          path: test-results
          when: always

      - store_artifacts:
          path: htmlcov
          destination: coverage-report
          when: always

  health_check:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Install dependencies
          command: uv sync --all-extras
      - run:
          name: Start service and health check
          command: |
            export DATABASE_URL="sqlite+pysqlite:///:memory:"
            export OTEL_SDK_DISABLED=true
            uv run uvicorn issue_tracker_service.main:app --host 0.0.0.0 --port 8000 &
            sleep 5
            curl -sf http://localhost:8000/health || exit 1

  terraform_fmt_validate:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install Terraform
          command: |
            sudo apt-get update
            sudo apt-get install -y wget unzip
            wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
            unzip -q terraform_1.8.5_linux_amd64.zip
            sudo mv terraform /usr/local/bin/terraform
            terraform -version

      - run:
          name: Terraform fmt + validate
          command: |
            cd infrastructure/terraform
            terraform fmt -check -recursive
            terraform init -backend=false
            terraform validate

  terraform_plan:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install Terraform
          command: |
            sudo apt-get update
            sudo apt-get install -y wget unzip
            wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
            unzip -q terraform_1.8.5_linux_amd64.zip
            sudo mv terraform /usr/local/bin/terraform
            terraform -version

      - run:
          name: Terraform plan
          command: |
            if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_OWNER_ID" ]; then
              echo "RENDER_API_KEY and/or RENDER_OWNER_ID missing; skipping terraform plan in this context."
              exit 0
            fi
            cd infrastructure/terraform
            terraform init
            terraform plan -out=tfplan

  terraform_apply:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install Terraform
          command: |
            sudo apt-get update
            sudo apt-get install -y wget unzip
            wget -q https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
            unzip -q terraform_1.8.5_linux_amd64.zip
            sudo mv terraform /usr/local/bin/terraform
            terraform -version

      - run:
          name: Terraform apply + health verification
          command: |
            if [ "${TF_AUTO_APPLY}" != "true" ]; then
              echo "TF_AUTO_APPLY is not true; skipping terraform apply for safe CI defaults."
              exit 0
            fi
            if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_OWNER_ID" ]; then
              echo "RENDER_API_KEY and/or RENDER_OWNER_ID missing; cannot apply."
              exit 1
            fi
            cd infrastructure/terraform
            terraform init
            terraform apply -auto-approve
            SERVICE_URL="$(terraform output -raw web_service_url)"
            if [ -z "$SERVICE_URL" ]; then
              echo "Missing web_service_url output"
              exit 1
            fi
            for i in $(seq 1 20); do
              if curl -sf "${SERVICE_URL}/health" >/dev/null; then
                echo "Health check passed: ${SERVICE_URL}/health"
                exit 0
              fi
              echo "Waiting for health endpoint... attempt $i/20"
              sleep 15
            done
            echo "Health check failed after retries"
            exit 1

workflows:
  version: 2
  ci:
    jobs:
      - lint
      - test
      - health_check
      - terraform_fmt_validate:
          requires:
            - lint
            - test
            - health_check
      - terraform_plan:
          requires:
            - terraform_fmt_validate
      - terraform_apply:
          requires:
            - terraform_plan
          filters:
            branches:
              only:
                - hw3
