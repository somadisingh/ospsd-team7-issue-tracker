[project]
name = "issue-tracker-adapter"
version = "0.1.0"
description = "Service client adapter implementing the Issue Tracker Client API via the auto-generated HTTP client"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "issue-tracker-client-api",
    "issue-tracker-service-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/issue_tracker_adapter"]

[tool.uv.sources]
issue-tracker-client-api = { workspace = true }
issue-tracker-service-client = { workspace = true }
